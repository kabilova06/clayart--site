<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — ClayArt</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .loader {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: #999;
        }
        .no-products {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: #999;
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <h1 class="logo">ClayArt</h1>
        <nav>
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="catalog.html" class="active">Каталог</a></li>
                <li><a href="about.html">О компании</a></li>
                <li><a href="gallery.html">Галерея</a></li>
                <li><a href="reviews.html">Отзывы</a></li>
                <li><a href="contacts.html">Контакты</a></li>
                <li><a href="faq.html">FAQ</a></li>
            </ul>
        </nav>
        <a href="cart.html" class="cart">
            <img src="images/cart.svg" class="cart-icon"> Корзина: <span id="cart-count">0</span>
        </a>
    </div>
</header>

<section class="catalog container">
    <h2>Каталог изделий</h2>
    
    <div class="catalog-filters">
        <button class="filter-btn active" data-cat="all">Все</button>
        <button class="filter-btn" data-cat="summer">Summer Collection</button>
        <button class="filter-btn" data-cat="mugs">Кружки</button>
        <button class="filter-btn" data-cat="plates">Тарелки</button>
        <button class="filter-btn" data-cat="vases">Вазы</button>
        <button class="filter-btn" data-cat="teapots">Чайники</button>
        <button class="filter-btn" data-cat="decor">Декор</button>
    </div>

    <div class="catalog-sort">
        <select id="sortSelect">
            <option value="default">Сортировка (по умолчанию)</option>
            <option value="price-asc">Цена: по возрастанию</option>
            <option value="price-desc">Цена: по убыванию</option>
            <option value="name-asc">По алфавиту: А-Я</option>
            <option value="name-desc">По алфавиту: Я-А</option>
        </select>
    </div>

    <div class="products" id="productsContainer">
        <div class="loader">Загрузка товаров...</div>
    </div>
</section>

<footer>
    <p>© 2026 ClayArt</p>
    <p style="margin-top: 10px;">
        <a href="/admin" style="color: #9d8b75; text-decoration: none; font-size: 12px;">🔐 Админ-панель</a>
    </p>
</footer>

<div class="image-modal" id="imageModal">
    <img src="" id="modalImage">
</div>

<script src="js/script.js"></script>

<script>
    let allProducts = [];
    let currentFilter = 'all';
    let currentSort = 'default';

    // Загрузка товаров с сервера
    async function loadProducts() {
        const container = document.getElementById('productsContainer');
        container.innerHTML = '<div class="loader">Загрузка товаров...</div>';
        
        try {
            const response = await fetch('/api/products');
            if (!response.ok) throw new Error('Ошибка загрузки');
            
            allProducts = await response.json();
            renderProducts();
        } catch(error) {
            console.error('Ошибка:', error);
            container.innerHTML = '<div class="no-products">❌ Ошибка загрузки каталога. Проверьте соединение с сервером.</div>';
        }
    }

    // Фильтрация товаров
    function filterProductsByCategory(products, category) {
        if (category === 'all') return products;
        if (category === 'summer') {
            return products.filter(p => p.is_summer === 1);
        }
        return products.filter(p => p.category === category);
    }

    // Сортировка товаров
    function sortProductsBy(products, sortType) {
        const sorted = [...products];
        switch(sortType) {
            case 'price-asc':
                return sorted.sort((a, b) => a.price - b.price);
            case 'price-desc':
                return sorted.sort((a, b) => b.price - a.price);
            case 'name-asc':
                return sorted.sort((a, b) => a.name.localeCompare(b.name));
            case 'name-desc':
                return sorted.sort((a, b) => b.name.localeCompare(a.name));
            default:
                return sorted.sort((a, b) => a.id - b.id);
        }
    }

    // Отображение товаров
    function renderProducts() {
        let filtered = filterProductsByCategory(allProducts, currentFilter);
        let sorted = sortProductsBy(filtered, currentSort);
        
        const container = document.getElementById('productsContainer');
        
        if (sorted.length === 0) {
            container.innerHTML = '<div class="no-products">😢 Товары не найдены</div>';
            return;
        }
        
        container.innerHTML = sorted.map(product => {
            const colorVariants = product.color_variants || [];
            const isSummer = product.is_summer === 1;
            const summerBadge = isSummer ? '<div class="summer-badge">SUMMER 2026</div>' : '';
            
            // Создаем HTML для выбора цвета, если есть варианты
            let colorHtml = '';
            if (colorVariants.length > 1) {
                const colorDots = colorVariants.map((img, idx) => {
                    // Определяем цвет кружка по изображению (для красоты)
                    let bgColor = '#7c5739';
                    if (img.includes('white')) bgColor = '#c9c9c9';
                    if (img.includes('black')) bgColor = '#1e1e1e';
                    if (img.includes('blue')) bgColor = '#508288';
                    if (img.includes('brown')) bgColor = '#2a2a2a';
                    return `<div class="color-dot" style="background:${bgColor}" onclick="changeProductImage(this, '${img}')"></div>`;
                }).join('');
                colorHtml = `<div class="color-options">${colorDots}</div>`;
            }
            
            return `
                <div class="product-card" data-category="${product.category}" data-id="${product.id}" data-summer="${isSummer}">
                    ${summerBadge}
                    <img src="${product.image || '/images/placeholder.jpg'}" 
                         class="product-image" 
                         onclick="openImage(this.src)" 
                         alt="${product.name}">
                    <h3>${escapeHtml(product.name)}</h3>
                    <p>${escapeHtml(product.description || 'Керамическое изделие ручной работы')}</p>
                    ${colorHtml}
                    <div class="price">${product.price} ₽</div>
                    <button onclick="addToCart(this, '${escapeHtml(product.name)}', ${product.price}, event)">
                        Добавить в корзину
                    </button>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Функция смены цвета товара (переопределяем, чтобы работала с динамическими элементами)
    function changeProductImage(element, newImage) {
    // Ищем карточку товара (поднимаемся вверх по DOM)
    let productCard = element.closest('.product-card');
    
    // Если не нашли через closest, пробуем другой способ
    if (!productCard) {
        productCard = element.parentElement?.parentElement;
    }
    
    if (!productCard) {
        console.log('Не найдена карточка товара');
        return;
    }
    
    // Находим изображение в карточке
    const image = productCard.querySelector('.product-image');
    if (!image) {
        console.log('Не найдено изображение');
        return;
    }
    
    // Меняем фото
    image.src = newImage;
    
    // Активный кружок
    const dots = productCard.querySelectorAll('.color-dot');
    dots.forEach(dot => {
        dot.classList.remove('active');
    });
    element.classList.add('active');
}

    // Фильтрация по кнопкам
    function setupFilters() {
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', function() {
                buttons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.getAttribute('data-cat');
                renderProducts();
            });
        });
    }

    // Сортировка
    function setupSort() {
        const sortSelect = document.getElementById('sortSelect');
        sortSelect.addEventListener('change', function() {
            currentSort = this.value;
            renderProducts();
        });
    }

    // Переопределяем функцию addToCart, если нужно
    const originalAddToCart = window.addToCart;
    window.addToCart = function(button, name, price, event) {
        console.log('🛒 Добавляем:', name, price);
        let imageSrc = '';
        const productCard = button.closest('.product-card');
        if (productCard) {
            const img = productCard.querySelector('.product-image');
            if (img) imageSrc = img.src;
        }
        
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push({ name, price, image: imageSrc });
        localStorage.setItem('cart', JSON.stringify(cart));
        
        if (typeof updateCartCount === 'function') updateCartCount();
        alert('Товар добавлен в корзину!');
    };

    // Инициализация
    document.addEventListener('DOMContentLoaded', function() {
        loadProducts();
        setupFilters();
        setupSort();
        
        // Обновляем счетчик корзины
        if (typeof updateCartCount === 'function') updateCartCount();
        else {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartCount = document.getElementById('cart-count');
            if (cartCount) cartCount.innerText = cart.length;
        }
        
        // Модалка для фото
        const modal = document.getElementById('imageModal');
        if (modal) {
            modal.addEventListener('click', function() {
                modal.classList.remove('active');
            });
        }
    });
    
    window.openImage = function(src) {
        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        if (modal && modalImage) {
            modal.classList.add('active');
            modalImage.src = src;
        }
    };
</script>

</body>
</html>
