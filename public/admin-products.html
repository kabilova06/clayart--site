<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление товарами — ClayArt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f6f3ef;
            padding: 30px 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            font-size: 36px;
            font-weight: 300;
            margin-bottom: 10px;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: #d8c3a5;
            color: #1e1e1e;
        }
        .btn-primary:hover {
            background: #1e1e1e;
            color: white;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        .products-table {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        th {
            background: #f8f5f1;
            font-weight: 500;
        }
        tr:hover {
            background: #faf8f5;
        }
        .product-image {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
        }
        .actions {
            display: flex;
            gap: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h3 {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 25px;
        }
        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 15px;
            border: 1px solid #e0ddd9;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            background: #f8f5f1;
        }
        .modal-content textarea {
            min-height: 100px;
            resize: vertical;
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
        }
        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #f0ebe4;
            border-radius: 20px;
            font-size: 12px;
        }
        .summer-badge {
            background: #f39c12;
            color: white;
        }
        .logout {
            color: #999;
        }
        .logout:hover {
            color: #e74c3c;
        }
        @media(max-width: 768px) {
            th, td {
                padding: 10px;
                font-size: 12px;
            }
            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <div>
                <h1>🛍️ Управление товарами</h1>
                <p>Добавляйте, редактируйте и удаляйте товары в каталоге</p>
            </div>
            <div style="display: flex; gap: 15px;">
                <a href="/admin-orders.html" class="btn btn-primary">📦 Заказы</a>
                <button class="btn btn-primary" onclick="openAddModal()">+ Добавить товар</button>
                <a href="/" class="btn logout">🏠 На сайт</a>
            </div>
        </div>

        <div class="products-table">
            <table>
                <thead>
                    <tr><th>ID</th><th>Изображение</th><th>Название</th><th>Цена</th><th>Категория</th><th>Summer</th><th>Действия</th></tr>
                </thead>
                <tbody id="productsList">
                    <tr><td colspan="7" style="text-align: center;">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Модальное окно добавления/редактирования -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Добавить товар</h3>
            <input type="hidden" id="productId">
            <input type="text" id="productName" placeholder="Название товара">
            <input type="number" id="productPrice" placeholder="Цена (₽)">
            <select id="productCategory">
                <option value="mugs">Кружки</option>
                <option value="plates">Тарелки</option>
                <option value="vases">Вазы</option>
                <option value="teapots">Чайники</option>
                <option value="decor">Декор</option>
                <option value="summer">Summer Collection</option>
            </select>
            <textarea id="productDescription" placeholder="Описание товара"></textarea>
            <input type="text" id="productImage" placeholder="URL изображения (например, /images/cup.jpg)">
            <input type="text" id="productColors" placeholder="Цвета (JSON, например: ['/img1.jpg','/img2.jpg'])">
            <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                <input type="checkbox" id="productSummer"> Летняя коллекция 2026
            </label>
            <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
    <input type="checkbox" id="productBestseller"> ⭐ Бестселлер (показывать на главной)
</label>
<label style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
    <input type="checkbox" id="productNew"> 🆕 Новинка (показывать на главной)
</label>
            <div class="modal-buttons">
                <button onclick="saveProduct()">💾 Сохранить</button>
                <button onclick="closeModal()" style="background:#eee;">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('admin_token');
        
        // Проверка авторизации
        if (!token) {
            window.location.href = '/admin';
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/admin/products', {
                    headers: { 'Authorization': token }
                });
                if (response.status === 401) {
                    localStorage.removeItem('admin_token');
                    window.location.href = '/admin';
                    return;
                }
                const products = await response.json();
                
                const tbody = document.getElementById('productsList');
                if (products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Нет товаров. Добавьте первый!</td></tr>';
                    return;
                }
                
                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td>${p.id}</td>
                        <td><img src="${p.image || '/images/placeholder.jpg'}" class="product-image" onerror="this.src='/images/placeholder.jpg'"></td>
                        <td><strong>${escapeHtml(p.name)}</strong></td>
                        <td>${p.price} ₽</td>
                        <td><span class="category-badge">${getCategoryName(p.category)}</span></td>
                        <td>${p.is_summer ? '🔥 Лето 2026' : '-'}</td>
                        <td class="actions">
                            <button class="btn btn-sm" onclick="editProduct(${p.id})">✏️</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">🗑️</button>
                        </td>
                    </tr>
                `).join('');
            } catch(e) {
                console.error(e);
                document.getElementById('productsList').innerHTML = '<tr><td colspan="7" style="text-align: center;">Ошибка загрузки</td></tr>';
            }
        }

        function getCategoryName(cat) {
            const names = {
                'mugs': 'Кружки', 'plates': 'Тарелки', 'vases': 'Вазы',
                'teapots': 'Чайники', 'decor': 'Декор', 'summer': 'Summer Collection'
            };
            return names[cat] || cat;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        let editId = null;

        function openAddModal() {
            editId = null;
            document.getElementById('productBestseller').checked = false;
            document.getElementById('productNew').checked = false;
            document.getElementById('modalTitle').innerText = 'Добавить товар';
            document.getElementById('productId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productCategory').value = 'mugs';
            document.getElementById('productDescription').value = '';
            document.getElementById('productImage').value = '';
            document.getElementById('productColors').value = '';
            document.getElementById('productSummer').checked = false;
            document.getElementById('modal').classList.add('active');
        }

        async function editProduct(id) {
            try {
                const response = await fetch(`/api/admin/products/${id}`, {
                    headers: { 'Authorization': token }
                });
                const product = await response.json();
                
                editId = id;
                document.getElementById('modalTitle').innerText = 'Редактировать товар';
                document.getElementById('productId').value = product.id;
                document.getElementById('productName').value = product.name;
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productCategory').value = product.category;
                document.getElementById('productDescription').value = product.description || '';
                document.getElementById('productImage').value = product.image || '';
                document.getElementById('productColors').value = product.color_variants ? JSON.stringify(product.color_variants) : '';
                document.getElementById('productSummer').checked = product.is_summer === 1;
                document.getElementById('modal').classList.add('active');
            } catch(e) {
                alert('Ошибка загрузки товара');
            }
        }

        async function saveProduct() {
            const product = {
                is_bestseller: document.getElementById('productBestseller').checked ? 1 : 0,
                is_new: document.getElementById('productNew').checked ? 1 : 0,
                name: document.getElementById('productName').value,
                price: parseInt(document.getElementById('productPrice').value) || 0,
                category: document.getElementById('productCategory').value,
                description: document.getElementById('productDescription').value,
                image: document.getElementById('productImage').value,
                color_variants: document.getElementById('productColors').value ? JSON.parse(document.getElementById('productColors').value) : [],
                is_summer: document.getElementById('productSummer').checked ? 1 : 0
            };
            
            try {
                let response;
                if (editId) {
                    response = await fetch(`/api/admin/products/${editId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'Authorization': token },
                        body: JSON.stringify(product)
                    });
                } else {
                    response = await fetch('/api/admin/products', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': token },
                        body: JSON.stringify(product)
                    });
                }
                
                if (response.ok) {
                    closeModal();
                    loadProducts();
                    alert(editId ? 'Товар обновлен!' : 'Товар добавлен!');
                } else {
                    alert('Ошибка сохранения');
                }
            } catch(e) {
                alert('Ошибка: ' + e.message);
            }
        }

        async function deleteProduct(id) {
            if (confirm('Удалить товар? Это действие нельзя отменить.')) {
                try {
                    const response = await fetch(`/api/admin/products/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': token }
                    });
                    if (response.ok) {
                        loadProducts();
                        alert('Товар удален');
                    } else {
                        alert('Ошибка удаления');
                    }
                } catch(e) {
                    alert('Ошибка: ' + e.message);
                }
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Закрытие по клику вне окна
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
<a href="/admin-orders.html" class="nav-link">📦 Заказы</a>
        loadProducts();
        
    </script>
</body>
</html>
