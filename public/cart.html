<a href="cart.html" class="cart">
            <img src="images/cart.svg" class="cart-icon"> Корзина:
            <span id="cart-count">0</span>
        </a>
    </div>

</header>

<section class="cart-page container">

    <h2>Корзина</h2>

    <div class="cart-layout">

        <!-- ТОВАРЫ -->

        <div class="cart-products-block">

            <div id="cart-items" class="cart-items-list">
            </div>

        </div>

        <!-- ОФОРМЛЕНИЕ -->

        <div class="checkout-block">

            <div id="total-price" class="cart-total">
                Общая сумма: 0 ₽
            </div>

<form id="orderForm" class="checkout-form">

    <input
        type="text"
        id="name"
        placeholder="Ваше имя"
        required
    >

    <input
        type="tel"
        id="phone"
        placeholder="Телефон"
        required
    >

    <textarea
        id="address"
        placeholder="Адрес доставки"
        required
    ></textarea>

    <button type="submit">
        Оформить заказ
    </button>

</form>

        </div>

    </div>

</section>

<div class="success-modal" id="successModal">

    <div class="success-content">

        <h2>Заказ оформлен</h2>

        <p>
            Большое спасибо за ваш заказ!
        </p>

        <button onclick="closeSuccessModal()">
            Закрыть
        </button>

    </div>

</div>
