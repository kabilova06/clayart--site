<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель — Заказы ClayArt</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f6f3ef; padding: 40px; }
        .order-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #ddd; }
        .order-number { font-size: 24px; color: #d8c3a5; font-weight: bold; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>📦 Заказы</h1>
    <div id="orders">Загрузка...</div>

    <script>
        async function loadOrders() {
            const container = document.getElementById('orders');
            container.innerHTML = 'Загрузка...';
            
            try {
                const response = await fetch('/api/orders');
                console.log('Статус ответа:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const orders = await response.json();
                console.log('Получено заказов:', orders.length);
                console.log('Данные:', orders);
                
                if (orders.length === 0) {
                    container.innerHTML = '<p>Нет заказов</p>';
                    return;
                }
                
                container.innerHTML = orders.map(order => `
                    <div class="order-card">
                        <div class="order-number">Заказ №${order.id}</div>
                        <p><strong>Клиент:</strong> ${order.customer}</p>
                        <p><strong>Телефон:</strong> ${order.phone}</p>
                        <p><strong>Адрес:</strong> ${order.address}</p>
                        <p><strong>Сумма:</strong> ${order.total} ₽</p>
                        <p><strong>Дата:</strong> ${new Date(order.created_at).toLocaleString()}</p>
                        <details>
                            <summary>Товары</summary>
                            <pre>${JSON.stringify(JSON.parse(order.items), null, 2)}</pre>
                        </details>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Ошибка:', err);
                container.innerHTML = `<p class="error">❌ Ошибка: ${err.message}</p>`;
            }
        }
        
        loadOrders();
    </script>
</body>
</html>
