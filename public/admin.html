<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Заказы ClayArt</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f6f3ef;
            padding: 40px 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 42px;
            font-weight: 300;
            color: #1e1e1e;
        }
        .back-link {
            display: inline-block;
            padding: 10px 24px;
            background: white;
            border-radius: 40px;
            text-decoration: none;
            color: #1e1e1e;
            transition: 0.3s;
            font-size: 14px;
        }
        .back-link:hover {
            background: #d8c3a5;
        }
        .refresh-btn {
            padding: 10px 24px;
            background: #d8c3a5;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            transition: 0.3s;
        }
        .refresh-btn:hover {
            background: #1e1e1e;
            color: white;
        }
        
        /* Сетка заказов */
        .orders-grid { display: grid; gap: 30px; }
        
        /* Карточка заказа */
        .order-card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .order-card:hover { transform: translateY(-5px); }
        
        /* Заголовок карточки */
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }
        .order-number {
            font-size: 24px;
            font-weight: 500;
            color: #d8c3a5;
        }
        .order-date {
            color: #999;
            font-size: 14px;
        }
        
        /* Информация о клиенте */
        .customer-info {
            background: #f8f5f1;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .customer-info p {
            margin: 8px 0;
            color: #555;
        }
        .customer-info strong {
            color: #1e1e1e;
        }
        
        /* Список товаров */
        .items-list { margin-top: 20px; }
        .items-list h3 {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .item:last-child { border-bottom: none; }
        .item-name { flex: 1; }
        .item-price { font-weight: 500; color: #1e1e1e; }
        
        /* Итого */
        .total {
            margin-top: 20px;
            padding-top: 20px;
            text-align: right;
            font-size: 22px;
            font-weight: 500;
            border-top: 2px solid #d8c3a5;
        }
        
        /* Пустое состояние */
        .empty {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 24px;
            color: #999;
        }
        
        /* Загрузка */
        .loader {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        
        @media(max-width: 768px) {
            body { padding: 20px; }
            h1 { font-size: 32px; }
            .order-card { padding: 20px; }
            .order-number { font-size: 20px; }
            .total { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📦 Управление заказами</h1>
            </div>
            <div style="display: flex; gap: 15px;">
                <a href="/" class="back-link">🏠 На главную</a>
                <button class="refresh-btn" onclick="loadOrders()">🔄 Обновить</button>
            </div>
        </div>
        
        <div id="ordersContainer" class="orders-grid">
            <div class="loader">Загрузка заказов...</div>
        </div>
    </div>

    <script>
        async function loadOrders() {
            const container = document.getElementById('ordersContainer');
            container.innerHTML = '<div class="loader">Загрузка заказов...</div>';
            
            try {
                const response = await fetch('/api/orders');
                const orders = await response.json();
                
                if (orders.length === 0) {
                    container.innerHTML = '<div class="empty">😢 Пока нет ни одного заказа</div>';
                    return;
                }
                
                container.innerHTML = orders.map(order => {
                    let items = [];
                    try {
                        items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
                    } catch(e) { items = []; }
                    
                    return `
                        <div class="order-card">
                            <div class="order-header">
                                <span class="order-number">Заказ №${order.id}</span>
                                <span class="order-date">${new Date(order.created_at).toLocaleDateString('ru-RU')} в ${new Date(order.created_at).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}</span>
                            </div>
                            <div class="customer-info">
                                <p><strong>👤 Клиент:</strong> ${escapeHtml(order.customer)}</p>
                                <p><strong>📞 Телефон:</strong> ${escapeHtml(order.phone)}</p>
                                <p><strong>📍 Адрес:</strong> ${escapeHtml(order.address)}</p>
                            </div>
                            <div class="items-list">
                                <h3>🛍️ Товары:</h3>
                                ${items.map(item => `
                                    <div class="item">
                                        <span class="item-name">${escapeHtml(item.name)}</span>
                                        <span class="item-price">${item.price} ₽</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="total">
                                Итого: ${order.total} ₽
                            </div>
                        </div>
                    `;
                }).join('');
            } catch(error) {
                console.error('Ошибка:', error);
                container.innerHTML = '<div class="empty">❌ Ошибка загрузки заказов</div>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        loadOrders();
    </script>
</body>
</html>
